name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Restore google-services.json
        run: printf '%s' "$GOOGLE_SERVICES_B64" | base64 --decode > app/google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_B64 }}

      - name: Run unit tests
        run: ./gradlew test

      - name: Lint
        run: ./gradlew lint

      - name: Build debug APK
        run: ./gradlew assembleDebug
