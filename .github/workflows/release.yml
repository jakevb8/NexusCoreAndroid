name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build, Sign & Publish to Google Play
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Restore google-services.json
        run: printf '%s' "$GOOGLE_SERVICES_B64" | base64 --decode > app/google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_B64 }}

      - name: Decode keystore
        run: printf '%s' "$KEYSTORE_B64" | base64 --decode > app/nexuscore-android-release.jks
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION_NAME="${TAG#v}"
          VERSION_CODE=$(git tag -l 'v*' | wc -l | tr -d ' ')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG  →  name=$VERSION_NAME  code=$VERSION_CODE"

      - name: Build release AAB
        env:
          RELEASE_STORE_FILE: nexuscore-android-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PversionName=${{ steps.version.outputs.version_name }} \
            -PversionCode=${{ steps.version.outputs.version_code }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: me.jakev.nexuscore
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
